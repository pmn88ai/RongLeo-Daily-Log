<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Log 🐉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ─── VARIABLES ─────────────────────────────────────────── */
:root {
  --bg:          #f5f4f0;
  --bg2:         #edecea;
  --surface:     #ffffff;
  --surface2:    #f9f8f6;
  --border:      #e2e0db;
  --text:        #1a1917;
  --text2:       #6b6760;
  --text3:       #a09d98;
  --accent:      #c0392b;
  --accent2:     #e74c3c;
  --morning:     #e67e22;
  --evening:     #6c5ce7;
  --green:       #27ae60;
  --yellow:      #f39c12;
  --blue:        #2980b9;
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --shadow-md:   0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --radius:      12px;
  --radius-sm:   8px;
  --radius-lg:   20px;
  --tab-h:       64px;
  --header-h:    56px;
  --font:        'Be Vietnam Pro', sans-serif;
  --mono:        'JetBrains Mono', monospace;
}
[data-theme="dark"] {
  --bg:          #141312;
  --bg2:         #1c1b19;
  --surface:     #222120;
  --surface2:    #2a2927;
  --border:      #333230;
  --text:        #f0ede8;
  --text2:       #9a9690;
  --text3:       #5a5753;
  --shadow:      0 1px 3px rgba(0,0,0,.3), 0 2px 8px rgba(0,0,0,.2);
  --shadow-md:   0 4px 16px rgba(0,0,0,.4), 0 1px 4px rgba(0,0,0,.2);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.3);
}

/* ─── RESET ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: var(--font); }
a { color: inherit; text-decoration: none; }
ul, ol { list-style: none; }

/* ─── LAYOUT ─────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}
.header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-logo {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.5px;
  flex: 1;
}
.header-logo span { color: var(--text); font-weight: 300; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-size: 18px;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--bg2); color: var(--text); }

.views {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--tab-h) + 16px);
  scroll-behavior: smooth;
}
.views::-webkit-scrollbar { width: 4px; }
.views::-webkit-scrollbar-track { background: transparent; }
.views::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ─── BOTTOM TABS ─────────────────────────────────────────── */
.tabs {
  height: var(--tab-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 100%;
  color: var(--text3);
  font-size: 11px;
  font-weight: 500;
  transition: color .15s;
  position: relative;
}
.tab-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
}

/* ─── FAB ─────────────────────────────────────────────────── */
.fab {
  position: fixed;
  right: 20px;
  bottom: calc(var(--tab-h) + 16px);
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
  transition: transform .15s, box-shadow .15s;
  z-index: 20;
  line-height: 1;
}
.fab:hover { transform: scale(1.06); box-shadow: var(--shadow-lg); }
.fab:active { transform: scale(.96); }
@media (min-width: 600px) { .fab { right: calc(50% - 280px); } }

/* ─── DATE NAV ────────────────────────────────────────────── */
.date-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.date-nav-arrows { display: flex; gap: 4px; }
.date-nav-arrows button {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.date-nav-arrows button:hover { background: var(--bg2); }
.date-display {
  flex: 1;
  text-align: center;
}
.date-display .date-main {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.date-display .date-sub {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
.date-today-btn {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  transition: background .15s;
}
.date-today-btn:hover { background: var(--accent); color: #fff; }

/* ─── SESSION BLOCK ──────────────────────────────────────── */
.session-block { margin-bottom: 20px; }
.session-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .3px;
}
.session-morning {
  background: rgba(230, 126, 34, .1);
  color: var(--morning);
  border-left: 3px solid var(--morning);
}
.session-evening {
  background: rgba(108, 92, 231, .1);
  color: var(--evening);
  border-left: 3px solid var(--evening);
}
.session-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 400;
  opacity: .7;
}

/* ─── ENTRY CARD ─────────────────────────────────────────── */
.entry-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  position: relative;
  overflow: hidden;
}
.entry-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.entry-card:active { transform: translateY(0); }
.entry-card.status-done { opacity: .65; }
.entry-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border);
}
.entry-card[data-type="work"]::before     { background: var(--blue); }
.entry-card[data-type="meeting"]::before  { background: var(--green); }
.entry-card[data-type="learning"]::before { background: var(--yellow); }
.entry-card[data-type="personal"]::before { background: var(--text3); }

.entry-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}
.entry-time {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  padding-top: 2px;
  white-space: nowrap;
}
.entry-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}
.entry-mood { font-size: 16px; flex-shrink: 0; }
.entry-content {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.entry-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}
.entry-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
}
.entry-action-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.entry-action-btn:hover { background: var(--border); color: var(--text); }
.entry-action-btn.done-btn:hover { background: rgba(39, 174, 96, .15); color: var(--green); }
.entry-action-btn.delete-btn:hover { background: rgba(192, 57, 43, .15); color: var(--accent); }

/* Today highlight — dùng class .today trên entry-card */
.entry-card.today {
  border-color: rgba(192, 57, 43, .25);
  box-shadow: var(--shadow), 0 0 0 1px rgba(192, 57, 43, .12);
}
.entry-card.today .entry-time { color: var(--accent); }

/* ─── CHIPS / TAGS ────────────────────────────────────────── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.chip-person {
  background: rgba(41, 128, 185, .1);
  color: var(--blue);
  border-color: rgba(41, 128, 185, .2);
  cursor: pointer;
}
.chip-person:hover { background: rgba(41, 128, 185, .2); }
.chip-tag {
  background: rgba(108, 92, 231, .1);
  color: var(--evening);
  border-color: rgba(108, 92, 231, .2);
}
.chip-followup {
  background: rgba(243, 156, 18, .12);
  color: var(--yellow);
  border-color: rgba(243, 156, 18, .25);
}
.chip-type-work     { background: rgba(41, 128, 185, .1); color: var(--blue); border-color: rgba(41, 128, 185, .2); }
.chip-type-meeting  { background: rgba(39, 174, 96, .1); color: var(--green); border-color: rgba(39, 174, 96, .2); }
.chip-type-learning { background: rgba(243, 156, 18, .12); color: var(--yellow); border-color: rgba(243, 156, 18, .25); }
.chip-type-personal { background: var(--bg2); color: var(--text3); }

/* ─── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ─── SEARCH VIEW ─────────────────────────────────────────── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.search-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: none;
  color: var(--text);
  font-size: 14px;
}
.search-bar input::placeholder { color: var(--text3); }
.search-bar .search-icon { color: var(--text3); font-size: 16px; }

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.filter-chip:hover, .filter-chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ─── PEOPLE VIEW ─────────────────────────────────────────── */
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.person-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
  box-shadow: var(--shadow);
}
.person-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.person-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--evening));
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}
.person-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.person-count { font-size: 11px; color: var(--text3); }

.people-filter-active {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text2);
}
.people-filter-active strong { color: var(--text); }
.clear-filter-btn {
  margin-left: auto;
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  transition: background .15s;
}
.clear-filter-btn:hover { background: var(--accent); color: #fff; }

/* ─── FOLLOW-UP VIEW ─────────────────────────────────────── */
.followup-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ─── SECTION TITLE ───────────────────────────────────────── */
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text3);
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ─── MODAL ──────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 100;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  max-height: 92vh;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal::-webkit-scrollbar { display: none; }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; flex: 1; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: var(--bg2);
  color: var(--text2);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 16px 20px; }

/* ─── FORM FIELDS ─────────────────────────────────────────── */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.field input,
.field textarea,
.field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.field input:focus,
.field textarea:focus,
.field select:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* Mood selector */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.mood-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all .15s;
  font-size: 20px;
}
.mood-btn .mood-label { font-size: 9px; color: var(--text3); font-family: var(--mono); }
.mood-btn:hover { border-color: var(--text3); background: var(--bg2); }
.mood-btn.selected { border-color: var(--accent); background: rgba(192, 57, 43, .08); }

/* People picker */
.people-picker { position: relative; }
.people-input-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  min-height: 42px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  cursor: text;
  transition: border-color .15s;
}
.people-input-wrap:focus-within { border-color: var(--accent); }
.people-input-wrap input {
  border: none;
  background: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  padding: 0;
  min-width: 80px;
  flex: 1;
}
.people-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(41, 128, 185, .12);
  color: var(--blue);
  border: 1px solid rgba(41, 128, 185, .25);
}
.people-chip-remove { cursor: pointer; font-size: 14px; opacity: .7; }
.people-chip-remove:hover { opacity: 1; }
.people-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  max-height: 180px;
  overflow-y: auto;
  z-index: 50;
  display: none;
}
.people-dropdown.open { display: block; }
.people-dropdown-item {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background .1s;
}
.people-dropdown-item:hover, .people-dropdown-item.focused { background: var(--bg2); }
.people-dropdown-item .item-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--evening));
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Tags input */
.tags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  min-height: 42px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  cursor: text;
  transition: border-color .15s;
}
.tags-wrap:focus-within { border-color: var(--accent); }
.tags-wrap input {
  border: none;
  background: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  padding: 0;
  min-width: 80px;
  flex: 1;
}
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(108, 92, 231, .1);

<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG — điền URL + KEY của bạn vào đây
═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  SUPABASE_URL: "https://ejxummgrpimhvzrwatjr.supabase.co",
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqeHVtbWdycGltaHZ6cndhdGpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjgxMzcsImV4cCI6MjA5MDUwNDEzN30.uqDtqlTVfTlzYNkqj5HoPuXBgrbIBxcvbUuEFCYTWCE",
  USER_ID: "RongLeo",
  APP_ID: "daily_log",
  TABLE_NAME: "daily_logs",
  CONTACTS_TABLE: "contacts"
};

/* ══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const state = {
  entries: [],
  contacts: [],
  currentDate: todayStr(),
  currentView: "timeline",
  people: { filterContactId: null, filterName: null },
  search: { query: "", filterType: "all" },
  editingId: null,
  detailEntry: null,
  selectedPeople: [],  // [{contact_id, name}]
  selectedTags: [],
  selectedMood: null,
  isOnline: true,
  supabase: null
};

/* ══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function nowTime() {
  return new Date().toTimeString().slice(0, 5);
}
function autoSession() {
  return new Date().getHours() < 12 ? "morning" : "evening";
}
function formatDate(str) {
  const d = new Date(str + "T00:00:00");
  const days = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
  return `${days[d.getDay()]}, ${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
}
function isToday(str) { return str === todayStr(); }
function avatarLetter(name) {
  if (!name) return "?";
  return name.trim().split(" ").pop()[0].toUpperCase();
}
function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

const MOOD_MAP = { happy:"😊", normal:"😐", stressed:"😤", tired:"😴", excited:"🤩" };
const TYPE_LABEL = { work:"💼 Work", meeting:"🤝 Meeting", learning:"📚 Learning", personal:"🌿 Personal" };

/* ══════════════════════════════════════════════════════════════
   SUPABASE / DB
═══════════════════════════════════════════════════════════════ */
function initSupabase() {
  if (CONFIG.SUPABASE_URL === "YOUR_SUPABASE_URL" || !CONFIG.SUPABASE_URL) {
    state.isOnline = false;
    setSyncStatus("offline");
    return null;
  }
  try {
    const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    state.supabase = client;
    state.isOnline = true;
    setSyncStatus("online");
    return client;
  } catch (e) {
    state.isOnline = false;
    setSyncStatus("offline");
    return null;
  }
}

function setSyncStatus(status) {
  const dot = document.getElementById("sync-dot");
  if (!dot) return;
  dot.className = "sync-dot" + (status === "offline" ? " offline" : status === "syncing" ? " syncing" : "");
}

async function dbLoad() {
  if (!state.supabase) return loadFromLocal();
  setSyncStatus("syncing");
  try {
    const { data, error } = await state.supabase
      .from(CONFIG.TABLE_NAME)
      .select("*")
      .eq("id_user", CONFIG.USER_ID)
      .eq("id_app", CONFIG.APP_ID)
      .order("date", { ascending: false })
      .order("time", { ascending: false });
    if (error) throw error;
    state.entries = data || [];
    saveToLocal();
    setSyncStatus("online");
  } catch (e) {
    console.warn("Supabase load failed, using localStorage:", e);
    loadFromLocal();
    setSyncStatus("offline");
  }
}

async function dbLoadContacts() {
  // Luôn load cache trước để people picker hoạt động khi offline
  try {
    const cached = localStorage.getItem(LS_CONTACTS);
    if (cached) state.contacts = JSON.parse(cached);
  } catch(e) { state.contacts = []; }

  if (!state.supabase) return;

  try {
    const { data, error } = await state.supabase
      .from(CONFIG.CONTACTS_TABLE)
      .select("id, name")
      .eq("id_user", CONFIG.USER_ID)
      .order("name");
    if (error) throw error;
    state.contacts = data || [];
    try { localStorage.setItem(LS_CONTACTS, JSON.stringify(state.contacts)); } catch(e) {}
  } catch (e) {
    console.warn("Could not load contacts (using cache):", e);
  }
}

async function dbInsert(entry) {
  if (!state.supabase) return localInsert(entry);
  setSyncStatus("syncing");
  try {
    const { data, error } = await state.supabase
      .from(CONFIG.TABLE_NAME)
      .insert(entry)
      .select()
      .single();
    if (error) throw error;
    state.entries.unshift(data);
    saveToLocal();
    setSyncStatus("online");
    return data;
  } catch (e) {
    console.warn("Insert failed, saving locally:", e);
    setSyncStatus("offline");
    return localInsert(entry);
  }
}

async function dbUpdate(id, changes) {
  changes.updated_at = new Date().toISOString();
  if (!state.supabase) return localUpdate(id, changes);
  setSyncStatus("syncing");
  try {
    const { data, error } = await state.supabase
      .from(CONFIG.TABLE_NAME)
      .update(changes)
      .eq("id", id)
      .eq("id_user", CONFIG.USER_ID)
      .eq("id_app", CONFIG.APP_ID)
      .select()
      .single();
    if (error) throw error;
    const idx = state.entries.findIndex(e => e.id === id);
    if (idx !== -1) state.entries[idx] = data;
    saveToLocal();
    setSyncStatus("online");
    return data;
  } catch (e) {
    console.warn("Update failed, saving locally:", e);
    setSyncStatus("offline");
    return localUpdate(id, changes);
  }
}

async function dbDelete(id) {
  if (!state.supabase) return localDelete(id);
  setSyncStatus("syncing");
  try {
    const { error } = await state.supabase
      .from(CONFIG.TABLE_NAME)
      .delete()
      .eq("id", id)
      .eq("id_user", CONFIG.USER_ID)
      .eq("id_app", CONFIG.APP_ID);
    if (error) throw error;
    state.entries = state.entries.filter(e => e.id !== id);
    saveToLocal();
    setSyncStatus("online");
  } catch (e) {
    console.warn("Delete failed:", e);
    setSyncStatus("offline");
    localDelete(id);
  }
}

/* ── LOCAL STORAGE FALLBACK ── */
const LS_ENTRIES  = `daily_log_${CONFIG.APP_ID}_entries`;
const LS_CONTACTS = `daily_log_${CONFIG.APP_ID}_contacts_cache`;

function saveToLocal() {
  try { localStorage.setItem(LS_ENTRIES, JSON.stringify(state.entries)); } catch(e) {}
}
function loadFromLocal() {
  try {
    const raw = localStorage.getItem(LS_ENTRIES);
    state.entries = raw ? JSON.parse(raw) : [];
  } catch(e) { state.entries = []; }
}
function localInsert(entry) {
  if (!entry.id) entry.id = uuid(); // chỉ gen khi Supabase không trả về id
  state.entries.unshift(entry);
  saveToLocal();
  return entry;
}
function localUpdate(id, changes) {
  const idx = state.entries.findIndex(e => e.id === id);
  if (idx !== -1) state.entries[idx] = { ...state.entries[idx], ...changes };
  saveToLocal();
  return state.entries[idx];
}
function localDelete(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  saveToLocal();
}

/* ══════════════════════════════════════════════════════════════
   RENDER — TIMELINE
═══════════════════════════════════════════════════════════════ */
function renderTimeline() {
  const d = state.currentDate;
  const dateMain = document.getElementById("date-main");
  const dateSub = document.getElementById("date-sub");
  dateMain.textContent = isToday(d) ? "Hôm nay" : formatDate(d);
  dateSub.textContent = d;

  const dayEntries = state.entries.filter(e => e.date === d);
  const sortByTime = (a, b) =>
    (b.time||"").padStart(5,"0").localeCompare((a.time||"").padStart(5,"0"));
  const morning = dayEntries.filter(e => e.session === "morning").sort(sortByTime);
  const evening = dayEntries.filter(e => e.session === "evening").sort(sortByTime);

  const container = document.getElementById("timeline-content");
  if (dayEntries.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Chưa có bản ghi nào cho ngày này.<br>Nhấn <strong>+</strong> để thêm.</p></div>`;
    return;
  }

  let html = "";
  if (morning.length > 0) {
    html += `<div class="session-block">
      <div class="session-header session-morning">☀️ Phiên Sáng<span class="session-count">${morning.length} bản ghi</span></div>
      ${morning.map(renderEntryCard).join("")}
    </div>`;
  }
  if (evening.length > 0) {
    html += `<div class="session-block">
      <div class="session-header session-evening">🌙 Phiên Tối<span class="session-count">${evening.length} bản ghi</span></div>
      ${evening.map(renderEntryCard).join("")}
    </div>`;
  }
  container.innerHTML = html;
}

function renderEntryCard(entry) {
  const people = Array.isArray(entry.people) ? entry.people : [];
  const tags = Array.isArray(entry.tags) ? entry.tags : [];
  const mood = MOOD_MAP[entry.mood] || "";

  const peopleChips = people.slice(0,3).map(p =>
    `<span class="chip chip-person" onclick="filterByPerson('${p.contact_id}','${escHtml(p.name)}');event.stopPropagation()">👤 ${escHtml(p.name)}</span>`
  ).join("");

  const tagChips = tags.slice(0,3).map(t =>
    `<span class="chip chip-tag">#${escHtml(t)}</span>`
  ).join("");

  const followupBadge = entry.follow_up && entry.status === "open"
    ? `<span class="chip chip-followup">📌 Follow-up</span>` : "";

  const typeClass = `chip-type-${entry.type || "work"}`;

    const todayClass = isToday(entry.date || "") ? " today" : "";
  return `<div class="entry-card status-${entry.status || "open"}${todayClass}" data-type="${entry.type||"work"}" data-id="${entry.id}" onclick="openDetailModal('${entry.id}')">
    <div class="entry-top">
      <span class="entry-time">${entry.time || "--:--"}</span>
      <span class="entry-title">${escHtml(entry.title || "")}</span>
      ${mood ? `<span class="entry-mood">${mood}</span>` : ""}
    </div>
    ${entry.content ? `<div class="entry-content">${escHtml(entry.content)}</div>` : ""}
    <div class="entry-meta">
      <span class="chip ${typeClass}">${TYPE_LABEL[entry.type] || entry.type}</span>
      ${peopleChips}${tagChips}${followupBadge}
      <div class="entry-actions" onclick="event.stopPropagation()">
        ${entry.status !== "done" ? `<button class="entry-action-btn done-btn" onclick="markDone('${entry.id}')" title="Mark done">✓</button>` : ""}
        <button class="entry-action-btn" onclick="duplicateEntry('${entry.id}')" title="Duplicate">📄</button>
        <button class="entry-action-btn" onclick="openEditModal('${entry.id}')" title="Sửa">✏️</button>
        <button class="entry-action-btn delete-btn" onclick="confirmDelete('${entry.id}')" title="Xoá">🗑</button>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════
   RENDER — SEARCH
═══════════════════════════════════════════════════════════════ */
function renderSearch() {
  const q = state.search.query.toLowerCase().trim();
  const typeF = state.search.filterType;

  let results = state.entries;
  if (typeF !== "all") results = results.filter(e => e.type === typeF);
  if (q) {
    results = results.filter(e => {
      const inTitle   = (e.title || "").toLowerCase().includes(q);
      const inContent = (e.content || "").toLowerCase().includes(q);
      const inPeople  = (e.people || []).some(p => p.name.toLowerCase().includes(q));
      const inTags    = (e.tags || []).some(t => t.toLowerCase().includes(q));
      const inFollow  = (e.follow_up || "").toLowerCase().includes(q);
      return inTitle || inContent || inPeople || inTags || inFollow;
    });
  }

  const container = document.getElementById("search-results");
  if (results.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Không tìm thấy kết quả.</p></div>`;
    return;
  }

  // Group by date
  const grouped = {};
  results.forEach(e => {
    const d = e.date || "unknown";
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(e);
  });

  let html = "";
  Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(d => {
    html += `<div class="section-title">${isToday(d) ? "Hôm nay" : formatDate(d)}</div>`;
    html += grouped[d].map(renderEntryCard).join("");
  });

  container.innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════
   RENDER — PEOPLE
═══════════════════════════════════════════════════════════════ */
function renderPeople() {
  const banner = document.getElementById("people-filter-banner");
  const container = document.getElementById("people-content");

  if (state.people.filterContactId) {
    // Show filtered entries
    banner.style.display = "flex";
    banner.innerHTML = `<span>Lọc theo: <strong>${escHtml(state.people.filterName)}</strong></span>
      <button class="clear-filter-btn" onclick="clearPeopleFilter()">Xoá bộ lọc</button>`;

    const filtered = state.entries.filter(e =>
      (e.people || []).some(p => p.contact_id === state.people.filterContactId)
    );

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Chưa có bản ghi nào với người này.</p></div>`;
      return;
    }

    const grouped = {};
    filtered.forEach(e => {
      const d = e.date || "unknown";
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(e);
    });

    let html = "";
    Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(d => {
      html += `<div class="section-title">${isToday(d) ? "Hôm nay" : formatDate(d)}</div>`;
      html += grouped[d].map(renderEntryCard).join("");
    });
    container.innerHTML = html;
    return;
  }

  banner.style.display = "none";

  // Build people map from entries
  const peopleMap = {};
  state.entries.forEach(e => {
    (e.people || []).forEach(p => {
      if (!peopleMap[p.contact_id]) {
        peopleMap[p.contact_id] = { ...p, count: 0 };
      }
      peopleMap[p.contact_id].count++;
    });
  });

  const people = Object.values(peopleMap).sort((a,b) => b.count - a.count);

  if (people.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><p>Chưa có ai trong nhật ký.</p></div>`;
    return;
  }

  container.innerHTML = `<div class="people-grid">${people.map(p => `
    <div class="person-card" onclick="filterByPerson('${p.contact_id}','${escHtml(p.name)}')">
      <div class="person-avatar">${avatarLetter(p.name)}</div>
      <div class="person-name">${escHtml(p.name)}</div>
      <div class="person-count">${p.count} bản ghi</div>
    </div>`).join("")}</div>`;
}

/* ══════════════════════════════════════════════════════════════
   RENDER — FOLLOW-UP
═══════════════════════════════════════════════════════════════ */
function renderFollowup() {
  const open = state.entries.filter(e => e.follow_up && e.status === "open");
  const done = state.entries.filter(e => e.follow_up && e.status === "done");

  document.getElementById("followup-stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${open.length}</div>
      <div class="stat-label">Cần làm</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${done.length}</div>
      <div class="stat-label">Đã xong</div>
    </div>`;

  const container = document.getElementById("followup-content");
  if (open.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><p>Không có việc gì cần làm!</p></div>`;
    return;
  }

  container.innerHTML = `
    <div class="section-title">Cần làm (${open.length})</div>
    ${open.map(e => `
      <div class="entry-card" data-type="${e.type||"work"}" onclick="openDetailModal('${e.id}')">
        <div class="entry-top">
          <span class="entry-time">${e.date} ${e.time||""}</span>
          <span class="entry-title">${escHtml(e.title||"")}</span>
        </div>
        <div class="detail-followup">📌 ${escHtml(e.follow_up)}</div>
        <div style="margin-top:8px">
          <button class="entry-action-btn done-btn" style="width:auto;padding:4px 10px;font-size:12px" onclick="markDone('${e.id}');event.stopPropagation()">✓ Mark done</button>
        </div>
      </div>`).join("")}`;
}

/* ══════════════════════════════════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════════════════════════════════ */
function openDetailModal(id) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  state.detailEntry = entry;

  const people = Array.isArray(entry.people) ? entry.people : [];
  const tags = Array.isArray(entry.tags) ? entry.tags : [];

  document.getElementById("detail-modal-title").textContent = entry.title || "Chi tiết";

  document.getElementById("detail-modal-body").innerHTML = `
    <div class="detail-section">
      <div class="detail-label">Thời gian</div>
      <div class="detail-value">${formatDate(entry.date || "")} ${entry.time || ""} — ${entry.session === "morning" ? "☀️ Sáng" : "🌙 Tối"}</div>
    </div>
    ${entry.content ? `<div class="detail-section">
      <div class="detail-label">Nội dung</div>
      <div class="detail-value">${escHtml(entry.content).replace(/\n/g, "<br>")}</div>
    </div>` : ""}
    <div class="detail-section">
      <div class="detail-label">Loại & Tâm trạng</div>
      <div class="detail-value" style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="chip chip-type-${entry.type}">${TYPE_LABEL[entry.type]||entry.type}</span>
        ${entry.mood ? `<span class="chip">${MOOD_MAP[entry.mood]} ${entry.mood}</span>` : ""}
        <span class="chip">${entry.status === "done" ? "✅ Done" : "🔴 Open"}</span>
      </div>
    </div>
    ${people.length ? `<div class="detail-section">
      <div class="detail-label">Gặp ai</div>
      <div class="detail-value" style="display:flex;gap:6px;flex-wrap:wrap">
        ${people.map(p => `<span class="chip chip-person" onclick="filterByPerson('${p.contact_id}','${escHtml(p.name)}');closeAllModals()">👤 ${escHtml(p.name)}</span>`).join("")}
      </div>
    </div>` : ""}
    ${tags.length ? `<div class="detail-section">
      <div class="detail-label">Tags</div>
      <div class="detail-value" style="display:flex;gap:6px;flex-wrap:wrap">
        ${tags.map(t => `<span class="chip chip-tag">#${escHtml(t)}</span>`).join("")}
      </div>
    </div>` : ""}
    ${entry.follow_up ? `<div class="detail-section">
      <div class="detail-label">Follow-up</div>
      <div class="detail-followup">📌 ${escHtml(entry.follow_up)}</div>
    </div>` : ""}`;

  const doneBtn = document.getElementById("detail-done-btn");
  if (entry.status === "done") {
    doneBtn.textContent = "🔴 Mở lại";
    doneBtn.onclick = () => { markDone(id, "open"); closeModal("detail-modal-overlay"); };
  } else {
    doneBtn.textContent = "✅ Mark Done";
    doneBtn.onclick = () => { markDone(id); closeModal("detail-modal-overlay"); };
  }

  document.getElementById("detail-edit-btn").onclick = () => {
    closeModal("detail-modal-overlay");
    openEditModal(id);
  };

  openModal("detail-modal-overlay");
}

/* ══════════════════════════════════════════════════════════════
   ENTRY MODAL
═══════════════════════════════════════════════════════════════ */
function openAddModal(date, session) {
  state.editingId = null;
  state.selectedPeople = [];
  state.selectedTags = [];
  state.selectedMood = null;

  document.getElementById("entry-modal-title").textContent = "➕ Ghi nhanh";
  document.getElementById("field-id").value = "";
  document.getElementById("field-title").value = "";
  document.getElementById("field-content").value = "";
  document.getElementById("field-date").value = date || state.currentDate;
  document.getElementById("field-time").value = nowTime();
  document.getElementById("field-session").value = session || autoSession();
  document.getElementById("field-type").value = "work";
  document.getElementById("field-followup").value = "";
  document.getElementById("field-status").value = "open";

  resetMoodUI();
  resetPeopleUI();
  resetTagsUI();

  openModal("entry-modal-overlay");
  setTimeout(() => document.getElementById("field-title").focus(), 300);
}

function openEditModal(id) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  state.editingId = id;

  document.getElementById("entry-modal-title").textContent = "✏️ Sửa bản ghi";
  document.getElementById("field-id").value = id;
  document.getElementById("field-title").value = entry.title || "";
  document.getElementById("field-content").value = entry.content || "";
  document.getElementById("field-date").value = entry.date || state.currentDate;
  document.getElementById("field-time").value = entry.time || nowTime();
  document.getElementById("field-session").value = entry.session || "morning";
  document.getElementById("field-type").value = entry.type || "work";
  document.getElementById("field-followup").value = entry.follow_up || "";
  document.getElementById("field-status").value = entry.status || "open";

  // Mood
  state.selectedMood = entry.mood || null;
  resetMoodUI();
  if (entry.mood) {
    document.querySelector(`.mood-btn[data-mood="${entry.mood}"]`)?.classList.add("selected");
  }

  // People
  state.selectedPeople = Array.isArray(entry.people) ? [...entry.people] : [];
  resetPeopleUI();
  renderPeopleChips();

  // Tags
  state.selectedTags = Array.isArray(entry.tags) ? [...entry.tags] : [];
  resetTagsUI();
  renderTagChips();

  openModal("entry-modal-overlay");
}

async function saveEntry() {
  const title = document.getElementById("field-title").value.trim();
  if (!title) { toast("Vui lòng nhập tiêu đề"); return; }

  const entry = {
    id_user: CONFIG.USER_ID,
    id_app: CONFIG.APP_ID,
    date: document.getElementById("field-date").value,
    session: document.getElementById("field-session").value,
    time: document.getElementById("field-time").value,
    title,
    content: document.getElementById("field-content").value.trim(),
    people: state.selectedPeople,
    tags: state.selectedTags,
    type: document.getElementById("field-type").value,
    follow_up: document.getElementById("field-followup").value.trim() || null,
    status: document.getElementById("field-status").value,
    mood: state.selectedMood
  };

  const isNew = !state.editingId;
  closeModal("entry-modal-overlay");

  if (!isNew) {
    await dbUpdate(state.editingId, entry);
    toast("✅ Đã cập nhật");
  } else {
    entry.created_at = new Date().toISOString();
    await dbInsert(entry);
    toast("✅ Đã lưu  ·  ⌘K để ghi tiếp");
    // Focus FAB để người dùng có thể tap nhanh trên mobile
    setTimeout(() => document.getElementById("fab")?.focus(), 200);
  }

  renderCurrentView();
}

/* ══════════════════════════════════════════════════════════════
   PEOPLE PICKER
═══════════════════════════════════════════════════════════════ */
function resetPeopleUI() {
  const wrap = document.getElementById("people-wrap");
  const input = document.getElementById("people-search");
  // Remove all chips, keep input
  [...wrap.querySelectorAll(".people-chip")].forEach(c => c.remove());
  input.value = "";
  closePeopleDropdown();
}

function renderPeopleChips() {
  const wrap = document.getElementById("people-wrap");
  const input = document.getElementById("people-search");
  [...wrap.querySelectorAll(".people-chip")].forEach(c => c.remove());
  state.selectedPeople.forEach(p => {
    const chip = document.createElement("span");
    chip.className = "people-chip";
    chip.innerHTML = `${escHtml(p.name)}<span class="people-chip-remove" data-id="${p.contact_id}">×</span>`;
    chip.querySelector(".people-chip-remove").onclick = (e) => {
      state.selectedPeople = state.selectedPeople.filter(x => x.contact_id !== p.contact_id);
      renderPeopleChips();
    };
    wrap.insertBefore(chip, input);
  });
}

function openPeopleDropdown(q) {
  const dropdown = document.getElementById("people-dropdown");
  const filtered = state.contacts.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) &&
    !state.selectedPeople.some(p => p.contact_id === c.id)
  ).slice(0, 8);

  if (filtered.length === 0) { dropdown.classList.remove("open"); return; }

  dropdown.innerHTML = filtered.map(c => `
    <div class="people-dropdown-item" data-id="${c.id}" data-name="${escHtml(c.name)}">
      <span class="item-avatar">${avatarLetter(c.name)}</span>
      ${escHtml(c.name)}
    </div>`).join("");

  dropdown.querySelectorAll(".people-dropdown-item").forEach(item => {
    item.onclick = () => {
      state.selectedPeople.push({ contact_id: item.dataset.id, name: item.dataset.name });
      renderPeopleChips();
      document.getElementById("people-search").value = "";
      closePeopleDropdown();
    };
  });

  dropdown.classList.add("open");
}

function closePeopleDropdown() {
  document.getElementById("people-dropdown").classList.remove("open");
}

/* ══════════════════════════════════════════════════════════════
   TAG INPUT
═══════════════════════════════════════════════════════════════ */
function resetTagsUI() {
  const wrap = document.getElementById("tags-wrap");
  const input = document.getElementById("tag-input");
  [...wrap.querySelectorAll(".tag-chip")].forEach(c => c.remove());
  input.value = "";
}

function renderTagChips() {
  const wrap = document.getElementById("tags-wrap");
  const input = document.getElementById("tag-input");
  [...wrap.querySelectorAll(".tag-chip")].forEach(c => c.remove());
  state.selectedTags.forEach(t => {
    const chip = document.createElement("span");
    chip.className = "tag-chip";
    chip.innerHTML = `#${escHtml(t)}<span class="tag-remove" data-tag="${t}">×</span>`;
    chip.querySelector(".tag-remove").onclick = () => {
      state.selectedTags = state.selectedTags.filter(x => x !== t);
      renderTagChips();
    };
    wrap.insertBefore(chip, input);
  });
}

function addTag(val) {
  const tag = val.trim().replace(/^#/, "");
  if (!tag || state.selectedTags.includes(tag)) return;
  state.selectedTags.push(tag);
  renderTagChips();
}

/* ══════════════════════════════════════════════════════════════
   MOOD
═══════════════════════════════════════════════════════════════ */
function resetMoodUI() {
  document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("selected"));
}

/* ══════════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════════ */
async function markDone(id, forcedStatus) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  const newStatus = forcedStatus || (entry.status === "done" ? "open" : "done");
  await dbUpdate(id, { status: newStatus });
  toast(newStatus === "done" ? "✅ Đã xong" : "🔴 Đã mở lại");
  renderCurrentView();
}

function confirmDelete(id) {
  showConfirm({
    icon: "🗑️",
    title: "Xoá bản ghi?",
    message: "Hành động này không thể hoàn tác.",
    onOk: async () => {
      await dbDelete(id);
      toast("🗑️ Đã xoá");
      renderCurrentView();
    }
  });
}

async function duplicateEntry(id) {
  const src = state.entries.find(e => e.id === id);
  if (!src) return;
  const clone = {
    id_user:    CONFIG.USER_ID,
    id_app:     CONFIG.APP_ID,
    date:       todayStr(),
    session:    autoSession(),
    time:       nowTime(),
    title:      src.title + " (copy)",
    content:    src.content,
    people:     src.people ? [...src.people] : [],
    tags:       src.tags   ? [...src.tags]   : [],
    type:       src.type,
    follow_up:  src.follow_up,
    status:     "open",
    mood:       src.mood,
    created_at: new Date().toISOString()
  };
  await dbInsert(clone);
  toast("📄 Đã duplicate — đang mở để sửa...");
  // Đổi ngày về hôm nay rồi mở edit
  state.currentDate = todayStr();
  renderCurrentView();
  // Tìm entry vừa insert (đầu mảng) và mở edit
  setTimeout(() => {
    const newest = state.entries[0];
    if (newest && newest.title === clone.title) openEditModal(newest.id);
  }, 150);
}

function filterByPerson(contactId, name) {
  state.people.filterContactId = contactId;
  state.people.filterName = name;
  switchView("people");
}

function clearPeopleFilter() {
  state.people.filterContactId = null;
  state.people.filterName = null;
  renderPeople();
}

/* ══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */
function switchView(name) {
  state.currentView = name;
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${name}`)?.classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(t => {
    t.classList.toggle("active", t.dataset.view === name);
  });
  renderCurrentView();
  document.getElementById("views").scrollTop = 0;
}

function renderCurrentView() {
  if (state.currentView === "timeline") renderTimeline();
  else if (state.currentView === "search") renderSearch();
  else if (state.currentView === "people") renderPeople();
  else if (state.currentView === "followup") renderFollowup();
}

/* ══════════════════════════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════════════════════════ */
function openModal(id) {
  document.getElementById(id).classList.add("open");
}
function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}
function closeAllModals() {
  document.querySelectorAll(".modal-overlay").forEach(m => m.classList.remove("open"));
}

/* ══════════════════════════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════════════════════════ */
let confirmCallback = null;
function showConfirm({ icon, title, message, onOk }) {
  document.getElementById("confirm-icon").textContent = icon || "⚠️";
  document.getElementById("confirm-title").textContent = title || "Xác nhận";
  document.getElementById("confirm-message").textContent = message || "";
  confirmCallback = onOk;
  document.getElementById("confirm-overlay").classList.add("open");
}

/* ══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

/* ══════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════ */
function initTheme() {
  const saved = localStorage.getItem("daily_log_theme") || "light";
  document.documentElement.setAttribute("data-theme", saved);
  document.getElementById("theme-toggle").textContent = saved === "dark" ? "☀️" : "🌙";
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("daily_log_theme", next);
  document.getElementById("theme-toggle").textContent = next === "dark" ? "☀️" : "🌙";
}

/* ══════════════════════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════════════════════ */
function exportData() {
  const blob = new Blob([JSON.stringify(state.entries, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `daily_log_${todayStr()}.json`;
  a.click();
  toast("📤 Đã export");
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error("Invalid format");
      showConfirm({
        icon: "📥",
        title: "Import dữ liệu?",
        message: `Sẽ thêm ${data.length} bản ghi. Dữ liệu hiện tại không bị xoá.`,
        onOk: async () => {
          let added = 0;
          for (const item of data) {
            // Validate schema tối thiểu
            if (!item.title || !item.date) continue;
            const exists = state.entries.some(e => e.id === item.id);
            if (!exists && item.id_user === CONFIG.USER_ID && item.id_app === CONFIG.APP_ID) {
              await dbInsert(item);
              added++;
            }
          }
          toast(`📥 Đã import ${added} bản ghi`);
          renderCurrentView();
        }
      });
    } catch(err) {
      toast("❌ File không hợp lệ");
    }
  };
  reader.readAsText(file);
}

/* ══════════════════════════════════════════════════════════════
   HTML ESCAPE
═══════════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* ══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
async function init() {
  initTheme();
  initSupabase();

  await Promise.all([dbLoad(), dbLoadContacts()]);

  renderTimeline();

  // ─── TAB BUTTONS
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchView(btn.dataset.view));
  });

  // ─── FAB
  document.getElementById("fab").addEventListener("click", () => openAddModal());

  // ─── DATE NAV
  document.getElementById("date-prev").addEventListener("click", () => {
    const d = new Date(state.currentDate + "T00:00:00");
    d.setDate(d.getDate() - 1);
    state.currentDate = d.toISOString().slice(0, 10);
    renderTimeline();
  });
  document.getElementById("date-next").addEventListener("click", () => {
    const d = new Date(state.currentDate + "T00:00:00");
    d.setDate(d.getDate() + 1);
    state.currentDate = d.toISOString().slice(0, 10);
    renderTimeline();
  });
  document.getElementById("date-today").addEventListener("click", () => {
    state.currentDate = todayStr();
    renderTimeline();
  });

  // ─── ENTRY MODAL
  document.getElementById("entry-modal-close").onclick = () => closeModal("entry-modal-overlay");
  document.getElementById("entry-modal-cancel").onclick = () => closeModal("entry-modal-overlay");
  document.getElementById("entry-modal-save").onclick = saveEntry;
  document.getElementById("entry-modal-overlay").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal("entry-modal-overlay");
  });

  // ─── DETAIL MODAL
  document.getElementById("detail-modal-close").onclick = () => closeModal("detail-modal-overlay");
  document.getElementById("detail-modal-overlay").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal("detail-modal-overlay");
  });

  // ─── MOOD
  document.querySelectorAll(".mood-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      resetMoodUI();
      if (state.selectedMood === btn.dataset.mood) {
        state.selectedMood = null;
      } else {
        state.selectedMood = btn.dataset.mood;
        btn.classList.add("selected");
      }
    });
  });

  // ─── SESSION AUTO-DETECT ON DATE OR TIME CHANGE
  function syncSessionFromTime() {
    const timeVal = document.getElementById("field-time").value;
    if (timeVal) {
      document.getElementById("field-session").value = timeVal < "12:00" ? "morning" : "evening";
    }
  }
  document.getElementById("field-date").addEventListener("change", () => {
    const val = document.getElementById("field-date").value;
    if (val === todayStr()) syncSessionFromTime();
  });
  document.getElementById("field-time").addEventListener("change", syncSessionFromTime);

  // ─── PEOPLE PICKER
  const peopleSearch = document.getElementById("people-search");
  peopleSearch.addEventListener("input", () => openPeopleDropdown(peopleSearch.value));
  peopleSearch.addEventListener("keydown", e => {
    const dropdown = document.getElementById("people-dropdown");
    const items = [...dropdown.querySelectorAll(".people-dropdown-item")];
    const active = dropdown.querySelector(".people-dropdown-item.focused");

    if (e.key === "Escape") { closePeopleDropdown(); return; }

    if (e.key === "ArrowDown") {
      e.preventDefault();
      const next = active ? (items.indexOf(active) + 1) % items.length : 0;
      items.forEach(i => i.classList.remove("focused"));
      items[next]?.classList.add("focused");
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      const prev = active ? (items.indexOf(active) - 1 + items.length) % items.length : items.length - 1;
      items.forEach(i => i.classList.remove("focused"));
      items[prev]?.classList.add("focused");
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      const target = active || items[0];
      if (target) {
        state.selectedPeople.push({ contact_id: target.dataset.id, name: target.dataset.name });
        renderPeopleChips();
        peopleSearch.value = "";
        closePeopleDropdown();
      }
    }
  });
  document.getElementById("people-wrap").addEventListener("click", () => peopleSearch.focus());
  document.addEventListener("click", e => {
    if (!e.target.closest(".people-picker")) closePeopleDropdown();
  });

  // ─── TAGS
  const tagInput = document.getElementById("tag-input");
  tagInput.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      addTag(tagInput.value);
      tagInput.value = "";
    }
    if (e.key === "Backspace" && !tagInput.value && state.selectedTags.length) {
      state.selectedTags.pop();
      renderTagChips();
    }
  });
  document.getElementById("tags-wrap").addEventListener("click", () => tagInput.focus());

  // ─── SEARCH
  document.getElementById("search-input").addEventListener("input", e => {
    state.search.query = e.target.value;
    renderSearch();
  });
  document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      state.search.filterType = chip.dataset.filter;
      renderSearch();
    });
  });

  // ─── THEME
  document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

  // ─── EXPORT
  document.getElementById("export-btn").addEventListener("click", exportData);

  // ─── IMPORT
  document.getElementById("import-btn").addEventListener("click", () => {
    document.getElementById("import-file").click();
  });
  document.getElementById("import-file").addEventListener("change", e => {
    if (e.target.files[0]) {
      importData(e.target.files[0]);
      e.target.value = "";
    }
  });

  // ─── CONFIRM DIALOG
  document.getElementById("confirm-ok").addEventListener("click", () => {
    document.getElementById("confirm-overlay").classList.remove("open");
    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
  });
  document.getElementById("confirm-cancel").addEventListener("click", () => {
    document.getElementById("confirm-overlay").classList.remove("open");
    confirmCallback = null;
  });

  // ─── KEYBOARD SHORTCUTS
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeAllModals();
    if ((e.metaKey || e.ctrlKey) && e.key === "k") {
      e.preventDefault();
      openAddModal();
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>
